# ============================================================
# Test Configuration - External Configuration File
# ============================================================
# This file stores test settings and credentials.
# No hardcoded values should exist in test code.
# ============================================================

# Base URLs
base.url=https://demo.bludit.com/admin/
home.url=https://demo.bludit.com/
dashboard.url=/admin/dashboard/
logout.url=https://demo.bludit.com/admin/logout

# Credentials
login.username=admin
login.password=demo123

# Timeouts (in seconds)
explicit.wait.timeout=10
short.wait.timeout=5

# Browser Configuration
browser.name=chrome
browser.headless=true
browser.sandbox=false
browser.shared.memory.disabled=true

# Screenshot Configuration
screenshot.on.failure=true
screenshot.directory=build/screenshots
